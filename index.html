<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khufu Guide</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#EDE0B8;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px;
    background:radial-gradient(ellipse at center,#1a1200 0%,#000 70%)}
  .ankh{font-size:70px;margin-bottom:20px}
  h1{font-size:2.4rem;color:#C9A84C;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
  p{color:#7A6830;margin-bottom:40px;font-size:1rem}
  .btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:280px}
  a.btn{display:block;padding:16px;border-radius:50px;font-size:1rem;font-weight:700;text-decoration:none;letter-spacing:1px;text-transform:uppercase;transition:all .2s;text-align:center}
  a.btn-gold{background:linear-gradient(135deg,#C9A84C,#8B6914);color:#000}
  a.btn-gold:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(201,168,76,.4)}
  a.btn-outline{border:1px solid #C9A84C;color:#C9A84C}
  a.btn-outline:hover{background:rgba(201,168,76,.1)}
  .sub{color:#7A6830;font-size:.75rem;margin-top:30px}
</style>
</head>
<body>
  <div class="ankh">𓂀</div>
  <h1>Khufu Guide</h1>
  <p>Smart Tour Guide Platform for Egypt</p>
  <div class="btns">
    <a href="khufu_portal.html" class="btn btn-gold">🏢 Company Portal</a>
    <a href="khufu_guide.html" class="btn btn-outline">🎒 Open Tour App</a>
  </div>
  <div class="sub">© 2025 Khufu Guide · Smart Tourism Platform</div>
</body>
</html>
